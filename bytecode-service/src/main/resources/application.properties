server.port=8711
spring.application.name=bytecode-service
logging.level.com.oobx=DEBUG
server.tomcat.use-apr-connector=false
spring.main.banner-mode=off
# Java binary used to run ysoserial subprocess (leave empty = use current JVM)
# Set to Java 8/11 path for full chain compatibility (Groovy1, etc.)
ysoserial.java=${YSOSERIAL_JAVA:}
# Java 7 binary for ysoserial_jdk7u21 (AnnotationInvocationHandler sUID compatibility)
ysoserial.java7=${YSOSERIAL_JAVA_7:}
