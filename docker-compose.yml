version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${OOBX_HTTP_PORT:-8010}:8010"
      - "${OOBX_LDAP_PORT:-1389}:1389"
      - "${OOBX_RMI_PORT:-1099}:1099"
      - "${OOBX_TCP_PORT:-9999}:9999"
      - "${OOBX_DNS_PORT:-5353}:5353/udp"
    volumes:
      - oobx-data:/app/data
    environment:
      OOBX_PUBLIC_ADDRESS: "${OOBX_PUBLIC_ADDRESS:?必须设置 OOBX_PUBLIC_ADDRESS 为服务器 IP}"
      OOBX_JWT_SECRET: "${OOBX_JWT_SECRET:?必须设置 OOBX_JWT_SECRET}"
      OOBX_SIDECAR_URL: "http://sidecar:8711"
      OOBX_DATABASE_URL: "sqlite+aiosqlite:////app/data/oobx.db"
      OOBX_DNS_ENABLED: "${OOBX_DNS_ENABLED:-false}"
      OOBX_DNS_ZONE: "${OOBX_DNS_ZONE:-oob.local}"
      OOBX_CORS_ORIGINS: '["*"]'
    depends_on:
      sidecar:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8010/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  sidecar:
    build:
      context: ./bytecode-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8711:8711"
    environment:
      YSOSERIAL_JAVA: /usr/lib/jvm/java-8-openjdk-amd64/bin/java
      JAVACHAINS_URL: http://127.0.0.1:8011
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8711/chains"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${OOBX_UI_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  oobx-data:
